name: Moni Agent Daily - $(Build.BuildId)

trigger: none

resources:
  repositories:
    - repository: pipeline-templates
      type: git
      name: DevOps/Pipeline_Templates
      ref: refs/heads/main

extends:
  template: pipeline.deployment.yaml@pipeline-templates
  parameters:
    ServiceName: 'moni-agent-daily'
    ImageName: 'moni-agent'
    VariableGroupNamePrefix: 'MoniAgent-<env>'
    ServiceConnection: 'REPLACE_WITH_SERVICE_CONNECTION_NAME'
    DockerfilePath: 'Dockerfile'
    DockerfileContext: '.'
    ServicePath: '.'
    isDeployAks: true
    isDeployAppService: false
    isBuildStage: false
