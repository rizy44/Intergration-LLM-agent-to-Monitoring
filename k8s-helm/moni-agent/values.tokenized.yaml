moni-agent:
  enabled: true
  replicaCount: 1

  image:
    repository: "__crServer__/moni-agent"
    tag: BuildID
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: regcred

  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 8000
    name: http

  ingress:
    enabled: true
    className: "nginx"
    host: "__INGRESS_HOST__"
    tlsSecret: "__INGRESS_TLS_SECRET__"

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  resources:
    requests:
      cpu: "__MONI_AGENT_REQUEST_CPU__"
      memory: "__MONI_AGENT_REQUEST_MEMORY__"
    limits:
      cpu: "__MONI_AGENT_LIMIT_CPU__"
      memory: "__MONI_AGENT_LIMIT_MEMORY__"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux

  env:
    # In-cluster Prometheus — credentials and URL vary per environment
    - name: PROMETHEUS_NODE_URL
      value: "__PROMETHEUS_NODE_URL__"
    - name: PROMETHEUS_NODE_USERNAME
      value: "__PROMETHEUS_NODE_USERNAME__"
    - name: PROMETHEUS_NODE_PASSWORD
      value: "__PROMETHEUS_NODE_PASSWORD__"

    # Azure Monitor Managed Prometheus — Azure AD secrets
    - name: PROMETHEUS_AKS_URL
      value: "__PROMETHEUS_AKS_URL__"
    - name: PROMETHEUS_AKS_TENANT_ID
      value: "__PROMETHEUS_AKS_TENANT_ID__"
    - name: PROMETHEUS_AKS_CLIENT_ID
      value: "__PROMETHEUS_AKS_CLIENT_ID__"
    - name: PROMETHEUS_AKS_CLIENT_SECRET
      value: "__PROMETHEUS_AKS_CLIENT_SECRET__"
    - name: PROMETHEUS_AKS_SUBSCRIPTION_ID
      value: "__PROMETHEUS_AKS_SUBSCRIPTION_ID__"

    # Daily report scope — varies per environment
    - name: DAILY_REPORT_SOURCES
      value: "__DAILY_REPORT_SOURCES__"
    - name: DAILY_REPORT_NAMESPACES
      value: "__DAILY_REPORT_NAMESPACES__"

    # Azure Monitor REST API (management.azure.com) — for App Service, MySQL, PostgreSQL metrics
    - name: AZURE_RESOURCE_NAME
      value: "__AZURE_RESOURCE_NAME__"
    - name: AZURE_RESOURCE_TENANT_ID
      value: "__AZURE_RESOURCE_TENANT_ID__"
    - name: AZURE_RESOURCE_CLIENT_ID
      value: "__AZURE_RESOURCE_CLIENT_ID__"
    - name: AZURE_RESOURCE_CLIENT_SECRET
      value: "__AZURE_RESOURCE_CLIENT_SECRET__"
    - name: AZURE_RESOURCE_SUBSCRIPTION_ID
      value: "__AZURE_RESOURCE_SUBSCRIPTION_ID__"

    # Anthropic
    - name: ANTHROPIC_API_KEY
      value: "__ANTHROPIC_API_KEY__"

    # Microsoft Teams
    - name: TEAMS_WEBHOOK_URL
      value: "__TEAMS_WEBHOOK_URL__"
    - name: TEAMS_OUTGOING_WEBHOOK_SECRET
      value: "__TEAMS_OUTGOING_WEBHOOK_SECRET__"
