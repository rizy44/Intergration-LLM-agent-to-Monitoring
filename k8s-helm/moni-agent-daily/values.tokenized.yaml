moni-agent-daily:
  enabled: true
  schedule: "0 2 * * *"

  image:
    repository: "__crServer__/moni-agent"
    tag: BuildID
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: regcred

  resources:
    requests:
      cpu: "__MONI_AGENT_REQUEST_CPU__"
      memory: "__MONI_AGENT_REQUEST_MEMORY__"
    limits:
      cpu: "__MONI_AGENT_LIMIT_CPU__"
      memory: "__MONI_AGENT_LIMIT_MEMORY__"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux

  env:
    # Prometheus multi-source (JSON array — overrides individual vars below when set)
    - name: PROMETHEUS_SOURCES
      value: "__PROMETHEUS_SOURCES__"

    # In-cluster Prometheus
    - name: PROMETHEUS_AKS_NAME
      value: "__PROMETHEUS_AKS_NAME__"
    - name: PROMETHEUS_AKS_URL
      value: "__PROMETHEUS_AKS_URL__"
    - name: PROMETHEUS_AKS_AUTH_TYPE
      value: "__PROMETHEUS_AKS_AUTH_TYPE__"
    - name: PROMETHEUS_AKS_USERNAME
      value: "__PROMETHEUS_AKS_USERNAME__"
    - name: PROMETHEUS_AKS_PASSWORD
      value: "__PROMETHEUS_AKS_PASSWORD__"
    - name: PROMETHEUS_AKS_DESCRIPTION
      value: "__PROMETHEUS_AKS_DESCRIPTION__"

    # Azure Monitor Managed Prometheus
    - name: PROMETHEUS_AZURE_NAME
      value: "__PROMETHEUS_AZURE_NAME__"
    - name: PROMETHEUS_AZURE_URL
      value: "__PROMETHEUS_AZURE_URL__"
    - name: PROMETHEUS_AZURE_AUTH_TYPE
      value: "__PROMETHEUS_AZURE_AUTH_TYPE__"
    - name: PROMETHEUS_AZURE_TENANT_ID
      value: "__PROMETHEUS_AZURE_TENANT_ID__"
    - name: PROMETHEUS_AZURE_CLIENT_ID
      value: "__PROMETHEUS_AZURE_CLIENT_ID__"
    - name: PROMETHEUS_AZURE_CLIENT_SECRET
      value: "__PROMETHEUS_AZURE_CLIENT_SECRET__"
    - name: PROMETHEUS_AZURE_SUBSCRIPTION_ID
      value: "__PROMETHEUS_AZURE_SUBSCRIPTION_ID__"
    - name: PROMETHEUS_AZURE_DESCRIPTION
      value: "__PROMETHEUS_AZURE_DESCRIPTION__"

    # Prometheus query settings
    - name: PROMETHEUS_TIMEOUT_SECONDS
      value: "__PROMETHEUS_TIMEOUT_SECONDS__"
    - name: PROMETHEUS_MAX_RESULTS
      value: "__PROMETHEUS_MAX_RESULTS__"
    - name: PROMETHEUS_DEFAULT_RANGE
      value: "__PROMETHEUS_DEFAULT_RANGE__"
    - name: ALLOWED_RANGES
      value: "__ALLOWED_RANGES__"

    # Daily report scope
    - name: DAILY_REPORT_SOURCES
      value: "__DAILY_REPORT_SOURCES__"
    - name: DAILY_REPORT_NAMESPACES
      value: "__DAILY_REPORT_NAMESPACES__"

    # OpenAI
    - name: OPENAI_API_KEY
      value: "__OPENAI_API_KEY__"
    - name: OPENAI_MODEL
      value: "__OPENAI_MODEL__"
    - name: OPENAI_MAX_TOKENS
      value: "__OPENAI_MAX_TOKENS__"

    # Microsoft Teams
    - name: TEAMS_WEBHOOK_URL
      value: "__TEAMS_WEBHOOK_URL__"
    - name: TEAMS_OUTGOING_WEBHOOK_SECRET
      value: "__TEAMS_OUTGOING_WEBHOOK_SECRET__"
