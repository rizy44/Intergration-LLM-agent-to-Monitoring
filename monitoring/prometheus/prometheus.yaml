global:
  scrape_interval: "20s"
  evaluation_interval: "15s"
  scrape_timeout: "18s"

scrape_configs:
  - job_name: 'prometheus-federates'
    scheme: https
    static_configs:
      - targets: [vn-prometheus.wecopytrade.com]
    metrics_path: /federate
    params:
      'match[]':
        - '{job="apiserver"}'
        - '{job="coredns"}'
        - '{job="kube-controller-manager"}'
        - '{job="kube-state-metrics"}'
        - '{job="kubelet"}'
        - '{job="kube-proxy"}'
        - '{job="tradingservicebots"}'
        - '{__name__=~"up"}'
    relabel_configs:
      - target_label: cluster
        replacement: vn
  - job_name: 'windows-exporters'
    metrics_path: /metrics
    basic_auth:
      username: admin
      password: rPGrJFhUq0IVbVAt
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(:[0-9]+)?'
        replacement: '${1}'
    static_configs:
      - targets: ["192.168.100.195:9182"]
        labels:
          hostname: "vn_trading_service"
          os: windows
#      - targets: ["136.244.98.85:9182"]
#        labels:
