groups:
- name: Windows-alert
  rules:
  ################ Windows High CPU Usage
  - alert: Windows High CPU Usage
    expr: 100 - avg(irate(windows_cpu_time_total{mode="idle"}[2m])) by (instance) * 100 > 70
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Windows High CPU Usage ({{ $labels.instance }}) for 5m"
      description: "CPU Usage is more than 70%"
      value: "{{ $value }}"

  ################ Windows High Memory Usage
  - alert: Windows High Memory Usage
    expr: (1 - (windows_os_physical_memory_free_bytes / windows_cs_physical_memory_bytes)) * 100 > 70
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Windows High Memory Usage ({{ $labels.instance }}) for 5m"
      description: "Memory usage is more than 70%"
      value: "{{ $value }}"

  ################ Windows Low Disk Space
  - alert: Windows Low Disk Space
    expr: (1 - (windows_logical_disk_free_bytes{volume="C:"} / windows_logical_disk_size_bytes{volume="C:"})) * 100 > 70
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Windows Low Disk Space ({{ $labels.instance }})"
      description: "Disk usage on C: is more than 70%"
      value: "{{ $value }}"

  ################ Windows Node Down
  - alert: Windows Node Down
    expr: up{job="windows-exporters"} == 0
    for: 10m
    labels:
      severity: critical
    annotations:
      summary: "Windows Node Down ({{ $labels.instance }})"
      description: "The Windows node is down for more than 1 minute"
