apiVersion: batch/v1
kind: CronJob
metadata:
  name: aks-daily-report
  namespace: monitoring
  labels:
    app: aks-metrics-service
    job: daily-report
spec:
  # Run every day at 08:00 UTC — adjust to your timezone
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: aks-metrics-service
            job: daily-report
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: daily-report
              image: your-registry/aks-metrics-service:latest
              imagePullPolicy: Always
              # Run the daily_report module directly
              command: ["python", "-m", "metrics_service.daily_report"]
              envFrom:
                - secretRef:
                    name: aks-metrics-assistant-secrets
              env:
                - name: LOG_LEVEL
                  value: "INFO"
                - name: ALLOWED_RANGES
                  value: "1h,6h,12h,24h,2d,7d"
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          restartPolicy: OnFailure
