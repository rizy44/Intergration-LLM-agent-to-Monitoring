apiVersion: v1
kind: Service
metadata:
  name: aks-metrics-service
  namespace: monitoring
  labels:
    app: aks-metrics-service
spec:
  # ClusterIP: internal only — Prometheus must not be exposed publicly
  type: ClusterIP
  selector:
    app: aks-metrics-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
