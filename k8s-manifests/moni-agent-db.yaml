apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv-volume-moni-agent-db
  labels:
    type: local
    app: moni-agent-db
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  storageClassName: standard
  hostPath:
    path: /mnt/moni-agent-db/data
    type: DirectoryOrCreate
  claimRef:
    namespace: moni-agent
    name: postgres-pv-claim-moni-agent-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pv-claim-moni-agent-db
  namespace: moni-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeMode: Filesystem
  storageClassName: standard
  volumeName: postgres-pv-volume-moni-agent-db
---
apiVersion: v1
kind: Secret
metadata:
  name: moni-agent-db-secret
  namespace: moni-agent
type: Opaque
stringData:
  POSTGRES_DB: moni_agent
  POSTGRES_USER: moni_agent
  POSTGRES_PASSWORD: "161272"
  # Connection string cho moni-agent service / cronjobs (tham chiếu sau này)
  DATABASE_URL: "postgresql://moni_agent:161272@moni-agent-db.moni-agent.svc.cluster.local:5432/moni_agent"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: moni-agent-db
  namespace: moni-agent
  labels:
    app: moni-agent-db
spec:
  serviceName: moni-agent-db
  replicas: 1
  selector:
    matchLabels:
      app: moni-agent-db
  template:
    metadata:
      labels:
        app: moni-agent-db
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values: [linux]
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: moni-agent-db-secret
          env:
            # Tránh lưu data thẳng vào mountpoint (lost+found gây lỗi initdb)
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "moni_agent", "-d", "moni_agent"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "moni_agent", "-d", "moni_agent"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pv-claim-moni-agent-db
---
# Service nội bộ — moni-agent service & cronjobs kết nối qua DNS này
apiVersion: v1
kind: Service
metadata:
  name: moni-agent-db
  namespace: moni-agent
  labels:
    app: moni-agent-db
spec:
  type: ClusterIP
  selector:
    app: moni-agent-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: moni-agent-db-nodeport
  namespace: moni-agent
  labels:
    app: moni-agent-db
spec:
  type: NodePort
  selector:
    app: moni-agent-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30432
